<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Brainly — Your second brain. Capture, organize and share everything that matters." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        var d = document.documentElement;
        d.classList.remove("light", "dark");
        if (t === "light" || t === "dark") d.classList.add(t);
        else d.classList.add(window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        d.style.colorScheme = d.classList.contains("dark") ? "dark" : "light";
      } catch (e) { }
    })();
  </script>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  <title>Brainly</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
